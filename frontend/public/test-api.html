<!DOCTYPE html>
<html>
<head>
    <title>Test API KOLO</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a1a; color: white; }
        button { padding: 15px 30px; margin: 10px; font-size: 16px; cursor: pointer; }
        #result { background: #333; padding: 20px; margin-top: 20px; white-space: pre-wrap; border-radius: 8px; }
        input { padding: 10px; margin: 5px; width: 300px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Test API KOLO</h1>
    
    <h3>1. Test connexion serveur</h3>
    <button onclick="testHealth()">Tester le serveur</button>
    
    <h3>2. Test Login</h3>
    <input type="email" id="email" placeholder="Email" value="pressardelliot@gmail.com">
    <input type="password" id="password" placeholder="Mot de passe" value="Test123">
    <button onclick="testLogin()">Tester Login</button>
    
    <h3>3. Test Inscription</h3>
    <input type="text" id="name" placeholder="Nom complet" value="Test User">
    <input type="email" id="regEmail" placeholder="Email">
    <input type="password" id="regPassword" placeholder="Mot de passe" value="Test123">
    <input type="tel" id="phone" placeholder="Téléphone" value="0612345678">
    <button onclick="testRegister()">Tester Inscription</button>
    
    <div id="result">Les résultats apparaîtront ici...</div>
    
    <script>
        const API = window.location.origin;
        
        function log(msg) {
            document.getElementById('result').textContent = msg;
            console.log(msg);
        }
        
        async function testHealth() {
            log('Test en cours...');
            try {
                const r = await fetch(API + '/api/');
                const d = await r.text();
                log('Status: ' + r.status + '\nReponse: ' + d);
            } catch(e) {
                log('ERREUR: ' + e.message);
            }
        }
        
        async function testLogin() {
            log('Test login en cours...');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const r = await fetch(API + '/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const d = await r.text();
                log('Status: ' + r.status + '\nReponse: ' + d);
            } catch(e) {
                log('ERREUR: ' + e.message);
            }
        }
        
        async function testRegister() {
            log('Test inscription en cours...');
            const email = document.getElementById('regEmail').value || 'test' + Date.now() + '@test.com';
            const password = document.getElementById('regPassword').value;
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            try {
                const r = await fetch(API + '/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        full_name: name,
                        phone: phone,
                        country_code: '+33'
                    })
                });
                const d = await r.text();
                log('Status: ' + r.status + '\nReponse: ' + d);
            } catch(e) {
                log('ERREUR: ' + e.message);
            }
        }
    </script>
</body>
</html>
