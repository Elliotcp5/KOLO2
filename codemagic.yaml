workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      vars:
        CI: "false"
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Build web app
        script: CI=false npm run build
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath build/App.xcarchive archive CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/App/build/**/*
