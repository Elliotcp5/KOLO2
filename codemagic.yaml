workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      groups:
        - Apple
      vars:
        BUNDLE_ID: "io.kolo.app"
        APP_STORE_APPLE_ID: "6761818371"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: io.kolo.app
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor
        script: npm install @capacitor/cli @capacitor/core @capacitor/ios --legacy-peer-deps
      - name: Build web app
        script: CI=false npm run build
      - name: Copy web assets
        script: npx cap copy ios
      - name: Set build number
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 10" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 10" ios/App/AppClip/Info.plist
      - name: Build AppClip
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -target AppClip \
            -configuration Release \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM=2XRB82J4W9 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="KOLO App Clip App Store" \
            CODE_SIGN_ENTITLEMENTS=AppClip/AppClip.entitlements \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon \
            CONFIGURATION_BUILD_DIR=$CM_BUILD_DIR/AppClipBuild \
            build \
            -allowProvisioningUpdates
      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM=2XRB82J4W9 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive \
            -allowProvisioningUpdates
      - name: Embed AppClip in archive
        script: |
          ARCHIVE_APP=$CM_BUILD_DIR/App.xcarchive/Products/Applications/App.app
          mkdir -p "$ARCHIVE_APP/AppClips"
          cp -r "$CM_BUILD_DIR/AppClipBuild/AppClip.app" "$ARCHIVE_APP/AppClips/"
          echo "AppClip embedded:"
          ls "$ARCHIVE_APP/AppClips/"
      - name: Export IPA
        script: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>2XRB82J4W9</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>io.kolo.app</key>
              <string>KOLO App Store</string>
              <key>io.kolo.app.Clip</key>
              <string>KOLO App Clip App Store</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/export \
            -allowProvisioningUpdates
    artifacts:
      - $CM_BUILD_DIR/export/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: false
        submit_to_app_store: false
