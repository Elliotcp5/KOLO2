workflows:
  kolo-ios-android:
    name: KOLO iOS & Android Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: io.kolo.app
      groups:
        - Apple
      vars:
        PACKAGE_NAME: "io.kolo.app"
        BUNDLE_ID: "io.kolo.app"
        APP_STORE_APPLE_ID: "6761818371"
      node: 20
      xcode: latest
      cocoapods: default
      java: 17

    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: main
          include: true
        - pattern: release/*
          include: true
      cancel_previous_builds: true

    scripts:
      - name: Install frontend dependencies
        script: |
          cd frontend
          yarn install --frozen-lockfile || yarn install

      - name: Build React app
        script: |
          cd frontend
          CI=false yarn build

      - name: Sync Capacitor (preserves custom iOS config)
        script: |
          cd frontend
          npx cap sync ios

      - name: CocoaPods install
        script: |
          cd frontend/ios/App
          pod install --repo-update

      - name: Increment build number
        script: |
          cd frontend/ios/App
          # Récupère le plus grand build number entre App Store et TestFlight, +1
          APP_STORE_NUM=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          TESTFLIGHT_NUM=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
          MAX_NUM=$(( APP_STORE_NUM > TESTFLIGHT_NUM ? APP_STORE_NUM : TESTFLIGHT_NUM ))
          BUILD_NUMBER=$((MAX_NUM + 1))
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" App/Info.plist
          echo "App Store latest: $APP_STORE_NUM, TestFlight latest: $TESTFLIGHT_NUM"
          echo "Set build number to $BUILD_NUMBER"

      - name: iOS code signing setup
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build iOS IPA
        script: |
          cd frontend/ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --archive-flags="-destination 'generic/platform=iOS'"

      - name: Android keystore setup
        script: |
          if [ -n "$CM_KEYSTORE" ]; then
            echo $CM_KEYSTORE | base64 --decode > /tmp/kolo-keystore.jks
            cat >> "$CM_BUILD_DIR/frontend/android/key.properties" <<EOF
          storePassword=$CM_KEYSTORE_PASSWORD
          keyPassword=$CM_KEY_PASSWORD
          keyAlias=$CM_KEY_ALIAS
          storeFile=/tmp/kolo-keystore.jks
          EOF
          fi || true

      - name: Sync Capacitor Android
        script: |
          cd frontend
          npx cap sync android || true

      - name: Build Android AAB
        script: |
          if [ -d frontend/android ]; then
            cd frontend/android
            ./gradlew bundleRelease || true
          fi

      - name: Build Android APK
        script: |
          if [ -d frontend/android ]; then
            cd frontend/android
            ./gradlew assembleRelease || true
          fi

    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - frontend/build.log

    publishing:
      email:
        recipients:
          - contact@trykolo.io
        notify:
          success: true
          failure: true

      app_store_connect:
        # Utilise les variables APP_STORE_CONNECT_PRIVATE_KEY / ISSUER_ID / KEY_IDENTIFIER du groupe Apple
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
