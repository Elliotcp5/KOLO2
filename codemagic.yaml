workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor
        script: npm install @capacitor/cli @capacitor/core @capacitor/ios --legacy-peer-deps
      - name: Build web app
        script: CI=false npm run build
      - name: Init Capacitor
        script: npx cap init KOLO com.kolo.app --web-dir build || true
      - name: Add iOS platform
        script: |
          rm -rf ios
          npx cap add ios
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build iOS
        script: |
          cd ios/App
          pod install || true
          xcodebuild -project App.xcodeproj -scheme App -configuration Release -archivePath build/App.xcarchive archive CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/App/build/**/*
