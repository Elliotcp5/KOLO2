workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "io.kolo.app"
        APP_STORE_APPLE_ID: "6761818371"
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Install Capacitor
        script: npm install @capacitor/cli @capacitor/core @capacitor/ios --legacy-peer-deps
      - name: Build web app
        script: CI=false npm run build
      - name: Init Capacitor
        script: npx cap init KOLO io.kolo.app --web-dir build || true
      - name: Add iOS platform
        script: |
          rm -rf ios
          npx cap add ios
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Build iOS
        script: |
          cd ios/App
          pod install || true
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            -allowProvisioningUpdates
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/export \
            -allowProvisioningUpdates
    artifacts:
      - $CM_BUILD_DIR/export/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false
